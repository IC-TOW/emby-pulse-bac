{% extends "layout.html" %}
{% block title %}缺集管理 - EmbyPulse{% endblock %}

{% block head %}
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
    [x-cloak] { display: none !important; }
    @keyframes radar-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .radar-sweep { background: conic-gradient(from 0deg at 50% 50%, transparent 270deg, rgba(59, 130, 246, 0.4) 360deg); border-radius: 50%; animation: radar-spin 2s linear infinite; }
    .dark .radar-sweep { background: conic-gradient(from 0deg at 50% 50%, transparent 270deg, rgba(56, 189, 248, 0.4) 360deg); }
    .ep-box { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .ep-box:hover { transform: scale(1.15) translateY(-2px); z-index: 10; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    /* 美化内部小滚动条 */
    .gap-scrollbar::-webkit-scrollbar { width: 4px; }
    .gap-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .gap-scrollbar::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.3); border-radius: 4px; }
    .dark .gap-scrollbar::-webkit-scrollbar-thumb { background: rgba(82, 82, 91, 0.5); }
</style>
{% endblock %}

{% block content %}
<div x-data="gapManager()" x-init="init()" class="max-w-[1400px] mx-auto space-y-6 px-2 sm:px-4 py-4 sm:py-6">

    <div class="glass-panel p-5 sm:p-6 rounded-3xl flex flex-col md:flex-row items-start md:items-center justify-between gap-4 md:gap-6 relative overflow-hidden">
        <div class="absolute -right-20 -top-20 w-64 h-64 bg-blue-500/10 dark:bg-blue-500/5 rounded-full blur-3xl pointer-events-none"></div>
        <div class="flex items-center gap-4 relative z-10">
            <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl bg-blue-50 dark:bg-blue-500/10 flex items-center justify-center relative overflow-hidden shadow-inner border border-blue-100 dark:border-blue-500/20 shrink-0">
                <div x-show="isScanning" class="absolute inset-0 radar-sweep"></div>
                <i class="fa-solid fa-tower-broadcast text-xl sm:text-2xl text-blue-500 relative z-10" :class="isScanning ? 'animate-pulse' : ''"></i>
            </div>
            <div>
                <h2 class="text-lg sm:text-xl font-extrabold tracking-tight text-slate-900 dark:text-white">媒体库光谱扫描</h2>
                <p class="text-[10px] sm:text-xs text-slate-500 dark:text-zinc-400 mt-0.5 sm:mt-1 font-medium">10路高并发极速引擎 (自动免疫未开播与花絮)</p>
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-3 relative z-10 w-full md:w-auto">
            <div class="flex items-center gap-2 bg-white dark:bg-[#0a0a0a] border border-slate-200 dark:border-white/10 px-3 py-2 rounded-xl shadow-sm flex-1 md:flex-none justify-between">
                <span class="text-xs font-bold text-slate-500 dark:text-zinc-400"><i class="fa-solid fa-clock mr-1"></i>自动巡检(3点)</span>
                <label class="relative inline-flex items-center cursor-pointer shrink-0">
                    <input type="checkbox" x-model="autoScan" @change="toggleAutoScan()" class="sr-only peer">
                    <div class="w-8 h-4 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-zinc-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all dark:border-gray-600 peer-checked:bg-blue-500"></div>
                </label>
            </div>
            <button @click="startScan()" :disabled="isScanning" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-5 py-2 rounded-xl font-bold transition-all border shadow-sm"
                    :class="isScanning ? 'bg-slate-100 border-slate-200 text-slate-400 dark:bg-white/5 dark:border-white/5 dark:text-zinc-500 cursor-not-allowed' : 'bg-white border-slate-200 text-slate-800 hover:bg-slate-50 dark:bg-white dark:border-transparent dark:text-black dark:hover:bg-gray-200'">
                <i x-show="!isScanning" class="fa-solid fa-satellite-dish"></i>
                <i x-show="isScanning" class="fa-solid fa-circle-notch fa-spin text-blue-500"></i>
                <span x-text="isScanning ? '雷达扫描中...' : '立即启动扫盘'"></span>
            </button>
        </div>
    </div>

    <div x-show="isScanning" class="glass-panel p-6 sm:p-8 rounded-3xl max-w-2xl mx-auto mt-10 shadow-lg text-center" x-cloak>
        <div class="relative w-20 h-20 sm:w-24 sm:h-24 mx-auto mb-6">
            <div class="absolute inset-0 border-4 border-blue-100 dark:border-blue-900/30 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-blue-500 rounded-full border-t-transparent animate-spin"></div>
            <i class="fa-solid fa-rocket text-2xl sm:text-3xl text-blue-500 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></i>
        </div>
        <h3 class="text-sm sm:text-lg font-bold text-slate-800 dark:text-white mb-6" x-text="scanItem"></h3>
        <div class="h-2 sm:h-3 bg-slate-200 dark:bg-zinc-800 rounded-full overflow-hidden shadow-inner relative mx-2 sm:mx-4">
            <div class="h-full bg-gradient-to-r from-blue-500 to-indigo-500 transition-all duration-300 ease-out" :style="`width: ${scanTotal > 0 ? (scanProgress / scanTotal) * 100 : 0}%`"></div>
        </div>
        <div class="text-[10px] sm:text-xs font-bold text-slate-400 dark:text-zinc-500 mt-3 tracking-widest font-mono">
            PROGRESS: <span x-text="scanProgress"></span> / <span x-text="scanTotal"></span>
        </div>
    </div>

    <div x-show="!isScanning && gapData.length > 0" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-4 sm:gap-6" x-transition x-cloak>
        <template x-for="series in gapData" :key="series.series_id">
            <div class="glass-panel p-4 sm:p-5 rounded-2xl sm:rounded-3xl relative overflow-hidden group shadow-sm hover:shadow-xl transition-all duration-500 border border-slate-200 dark:border-white/5">
                
                <div class="absolute right-3 top-3 z-20 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    <a :href="series.emby_url" target="_blank" class="w-7 h-7 rounded-full bg-white/80 dark:bg-black/60 backdrop-blur-md flex items-center justify-center text-slate-600 dark:text-zinc-300 hover:text-blue-500 dark:hover:text-blue-400 transition-colors shadow-sm border border-slate-200 dark:border-white/10" title="在 Emby 中打开">
                        <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                    </a>
                    <button @click.prevent="ignoreSeries(series)" class="w-7 h-7 rounded-full bg-white/80 dark:bg-black/60 backdrop-blur-md flex items-center justify-center text-slate-600 dark:text-zinc-300 hover:text-rose-500 dark:hover:text-rose-400 transition-colors shadow-sm border border-slate-200 dark:border-white/10" title="永久忽略该剧全部提示">
                        <i class="fa-solid fa-eye-slash text-[10px]"></i>
                    </button>
                </div>

                <div class="absolute right-0 bottom-0 w-1/2 h-full opacity-5 dark:opacity-10 pointer-events-none transform translate-x-1/4 translate-y-1/4 group-hover:scale-110 group-hover:rotate-3 transition-transform duration-700">
                    <img :src="series.poster" class="w-full h-full object-cover blur-xl rounded-full">
                </div>

                <div class="flex gap-4 sm:gap-5 relative z-10">
                    <a :href="series.emby_url" target="_blank" class="shrink-0 block group/poster relative">
                        <img :src="series.poster" class="w-16 sm:w-20 rounded-xl shadow-md ring-1 ring-slate-200 dark:ring-white/10 aspect-[2/3] object-cover group-hover/poster:opacity-80 transition-opacity bg-slate-100 dark:bg-zinc-800">
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover/poster:opacity-100 transition-opacity">
                            <i class="fa-solid fa-play text-white text-xl drop-shadow-md"></i>
                        </div>
                    </a>

                    <div class="flex-1 min-w-0">
                        <h3 class="text-base sm:text-lg font-extrabold text-slate-900 dark:text-white truncate pr-16" x-text="series.series_name"></h3>
                        <div class="text-[10px] sm:text-xs font-bold text-rose-500 bg-rose-50 dark:bg-rose-500/10 px-2 py-1 rounded-md inline-block mt-1 mb-3 border border-rose-100 dark:border-rose-500/20">
                            发现 <span x-text="series.gaps.length"></span> 处断层
                        </div>

                        <div class="space-y-2.5 max-h-32 overflow-y-auto gap-scrollbar pr-1">
                            <template x-for="(eps, s_num) in groupGaps(series.gaps)" :key="s_num">
                                <div class="flex items-start gap-2">
                                    <div class="text-[10px] font-black text-slate-400 dark:text-zinc-500 tracking-wider w-8 shrink-0 pt-1">S<span x-text="String(s_num).padStart(2,'0')"></span></div>
                                    <div class="flex flex-wrap gap-1.5">
                                        <template x-for="ep in eps" :key="ep.episode">
                                            <div x-show="ep.status === 0" @click="openResolver(series, ep)" class="ep-box w-6 h-6 sm:w-7 sm:h-7 rounded-lg bg-white dark:bg-[#0a0a0a] border border-rose-300 dark:border-rose-500/50 shadow-sm flex items-center justify-center cursor-pointer relative overflow-hidden" title="点击补全该集">
                                                <div class="absolute inset-0 bg-rose-500/10 animate-pulse"></div>
                                                <span class="text-[10px] sm:text-[11px] font-bold text-rose-600 dark:text-rose-400 relative z-10" x-text="ep.episode"></span>
                                            </div>
                                            <div x-show="ep.status === 2" class="w-6 h-6 sm:w-7 sm:h-7 rounded-lg bg-blue-50 dark:bg-blue-500/10 border border-blue-300 dark:border-blue-500/50 flex items-center justify-center relative overflow-hidden cursor-help" title="MP 下载处理中...">
                                                <div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-blue-500/20 to-transparent animate-pulse"></div>
                                                <span class="text-[10px] sm:text-[11px] font-bold text-blue-600 dark:text-blue-400 relative z-10" x-text="ep.episode"></span>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <div x-show="!isScanning && hasScanned && gapData.length === 0" class="text-center py-20 sm:py-32" x-cloak>
        <div class="w-20 h-20 sm:w-24 sm:h-24 bg-green-50 dark:bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-green-100 dark:border-green-500/20">
            <i class="fa-solid fa-check text-3xl sm:text-4xl text-green-500"></i>
        </div>
        <h3 class="text-lg sm:text-xl font-bold text-slate-900 dark:text-white">媒体库完美无暇</h3>
        <p class="text-xs sm:text-sm text-slate-500 dark:text-zinc-400 mt-2">未发现任何可修补的断层，强迫症大满足。</p>
    </div>

    <div x-show="resolver.open" class="fixed inset-0 z-[100] flex items-end md:items-center justify-center p-0 md:p-4" x-cloak>
        <div x-show="resolver.open" x-transition.opacity @click="closeResolver()" class="absolute inset-0 bg-slate-900/60 dark:bg-black/80 backdrop-blur-sm"></div>
        <div x-show="resolver.open" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-full md:translate-y-10 scale-95" x-transition:enter-end="opacity-100 translate-y-0 scale-100" 
             class="relative w-full md:w-[700px] max-h-[90vh] bg-white dark:bg-[#0a0a0a] border border-slate-200 dark:border-white/10 rounded-t-3xl md:rounded-3xl overflow-hidden shadow-2xl flex flex-col">
            <div class="p-4 sm:p-6 border-b border-slate-100 dark:border-white/5 flex justify-between items-center bg-slate-50 dark:bg-white/5">
                <div>
                    <h3 class="text-lg sm:text-xl font-extrabold text-slate-900 dark:text-white flex items-center gap-2"><i class="fa-solid fa-dna text-blue-500"></i> 基因配型中心</h3>
                    <p class="text-[10px] sm:text-xs font-medium text-slate-500 dark:text-zinc-400 mt-1">正在为 <span class="font-bold text-slate-700 dark:text-zinc-200" x-text="`${resolver.seriesName} S${String(resolver.season).padStart(2,'0')}E${String(resolver.episode).padStart(2,'0')}`"></span> 寻找完美拼图</p>
                </div>
                <button @click="closeResolver()" class="w-8 h-8 rounded-full bg-slate-200 hover:bg-slate-300 dark:bg-white/10 dark:hover:bg-white/20 text-slate-500 dark:text-zinc-300 transition-colors flex items-center justify-center">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="p-4 sm:p-6 overflow-y-auto flex-1 bg-white dark:bg-transparent">
                <div class="mb-6">
                    <div class="text-[10px] sm:text-[11px] font-black text-slate-400 dark:text-zinc-500 tracking-widest uppercase mb-2">家族遗传基因</div>
                    <div class="flex gap-2 flex-wrap" x-show="!resolver.isLoading">
                        <template x-for="gene in resolver.genes" :key="gene">
                            <span class="px-2.5 py-1 bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 text-slate-700 dark:text-zinc-300 text-[10px] sm:text-xs font-bold rounded-lg shadow-sm" x-text="gene"></span>
                        </template>
                    </div>
                    <div x-show="resolver.isLoading" class="h-6 w-32 bg-slate-200 dark:bg-white/10 rounded animate-pulse"></div>
                </div>
                <div>
                    <div class="text-[10px] sm:text-[11px] font-black text-slate-400 dark:text-zinc-500 tracking-widest uppercase mb-3 flex items-center gap-2">MoviePilot 匹配舱 <i x-show="resolver.isLoading" class="fa-solid fa-circle-notch fa-spin text-blue-500"></i></div>
                    <div x-show="resolver.isLoading" class="space-y-3"><div class="h-16 w-full bg-slate-100 dark:bg-white/5 rounded-xl animate-pulse"></div><div class="h-16 w-full bg-slate-100 dark:bg-white/5 rounded-xl animate-pulse"></div></div>
                    <div x-show="!resolver.isLoading && resolver.results.length > 0" class="space-y-3">
                        <template x-for="(res, index) in resolver.results" :key="index">
                            <label class="flex items-center gap-3 sm:gap-4 p-3 sm:p-4 rounded-xl border cursor-pointer transition-all hover:bg-slate-50 dark:hover:bg-white/5 group" :class="resolver.selectedTorrent === res ? 'border-blue-500 bg-blue-50/50 dark:bg-blue-500/10 shadow-md shadow-blue-500/10' : 'border-slate-200 dark:border-white/10 bg-white dark:bg-transparent'">
                                <input type="radio" :value="res" x-model="resolver.selectedTorrent" class="w-4 h-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:bg-black dark:border-zinc-600">
                                <div class="flex-1 min-w-0">
                                    <div class="font-bold text-xs sm:text-sm text-slate-900 dark:text-white truncate" x-text="res.title"></div>
                                    <div class="flex flex-wrap items-center gap-2 mt-1.5">
                                        <span class="text-[9px] sm:text-[10px] px-1.5 py-0.5 rounded font-black border" :class="res.match_score >= 50 ? 'bg-green-100 text-green-700 border-green-200 dark:bg-green-500/20 dark:text-green-400 dark:border-green-500/30' : (res.match_score > 0 ? 'bg-yellow-100 text-yellow-700 border-yellow-200 dark:bg-yellow-500/20 dark:text-yellow-400 dark:border-yellow-500/30' : 'bg-slate-100 text-slate-500 border-slate-200 dark:bg-white/10 dark:text-zinc-400 dark:border-white/10')">Score: <span x-text="res.match_score"></span></span>
                                        <span class="text-[9px] sm:text-[10px] text-slate-500 font-medium" x-text="formatBytes(res.size)"></span>
                                        <div class="h-3 w-px bg-slate-300 dark:bg-zinc-700"></div>
                                        <template x-for="tag in res.extracted_tags" :key="tag"><span class="text-[9px] sm:text-[10px] text-blue-600 dark:text-blue-400 font-bold" x-text="tag"></span></template>
                                    </div>
                                </div>
                            </label>
                        </template>
                    </div>
                    <div x-show="!resolver.isLoading && resolver.results.length === 0" class="text-center py-10"><i class="fa-solid fa-satellite-dish text-4xl text-slate-300 dark:text-zinc-700 mb-3 block"></i><p class="text-xs sm:text-sm font-bold text-slate-500 dark:text-zinc-400">未捕获到符合该集的资源星尘</p></div>
                </div>
            </div>
            <div class="p-4 sm:p-6 border-t border-slate-100 dark:border-white/5 bg-slate-50 dark:bg-black flex gap-3 pb-[env(safe-area-inset-bottom)]">
                <button @click="ignoreGap()" class="px-4 sm:px-5 py-2.5 sm:py-3 rounded-xl text-sm font-bold text-slate-600 bg-slate-200 hover:bg-slate-300 dark:bg-white/10 dark:text-zinc-300 dark:hover:bg-white/20 transition-colors flex items-center justify-center gap-2"><i class="fa-regular fa-eye-slash"></i> <span class="hidden sm:inline">永久忽略</span></button>
                <button @click="sendToMP()" :disabled="!resolver.selectedTorrent || resolver.isSubmitting" class="flex-1 py-2.5 sm:py-3 rounded-xl text-sm font-bold text-white transition-all shadow-lg flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed" :class="resolver.selectedTorrent ? 'bg-slate-900 hover:bg-slate-800 shadow-slate-900/20 dark:bg-white dark:text-black dark:hover:bg-gray-200' : 'bg-slate-400 dark:bg-zinc-700 shadow-none'">
                    <span x-show="resolver.isSubmitting" class="animate-spin w-4 h-4 border-2 border-white/30 border-t-white dark:border-black/30 dark:border-t-black rounded-full"></span><span x-show="!resolver.isSubmitting">发送至 MP 补齐</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('gapManager', () => ({
        isScanning: false, hasScanned: false, autoScan: false,
        scanProgress: 0, scanTotal: 0, scanItem: '等待启航...',
        pollInterval: null, gapData: [],
        resolver: { open: false, isLoading: false, isSubmitting: false, seriesId: '', seriesName: '', season: 0, episode: 0, genes: [], results: [], selectedTorrent: null, sourceEpObj: null },

        init() { 
            this.checkStatus(); 
            this.fetchAutoScan();
        },

        async fetchAutoScan() {
            try {
                const res = await fetch('/api/gaps/scan/auto_status');
                const data = await res.json();
                if (data.status === 'success') { this.autoScan = data.enabled; }
            } catch(e) {}
        },

        async toggleAutoScan() {
            try {
                await fetch('/api/gaps/scan/auto_toggle', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ enabled: this.autoScan }) });
            } catch(e) {}
        },

        async checkStatus() {
            try {
                const res = await fetch('/api/gaps/scan/progress');
                const data = await res.json();
                if (data.status === 'success') {
                    if (data.data.is_scanning) { this.startPolling(); } 
                    else if (data.data.results && data.data.results.length > 0) {
                        this.gapData = data.data.results; this.hasScanned = true;
                    }
                }
            } catch(e) {}
        },

        async startScan() {
            try {
                const res = await fetch('/api/gaps/scan/start', { method: 'POST' });
                const data = await res.json();
                if (data.status === 'success') { this.startPolling(); } 
                else { alert(data.message); }
            } catch(e) {}
        },

        startPolling() {
            this.isScanning = true;
            this.pollInterval = setInterval(async () => {
                try {
                    const res = await fetch('/api/gaps/scan/progress');
                    const data = await res.json();
                    if (data.status === 'success') {
                        const state = data.data;
                        this.isScanning = state.is_scanning; this.scanProgress = state.progress;
                        this.scanTotal = state.total; this.scanItem = state.current_item;

                        if (!this.isScanning) {
                            clearInterval(this.pollInterval); this.hasScanned = true;
                            if (state.error) alert("扫描出错: " + state.error);
                            else this.gapData = state.results;
                        }
                    }
                } catch(e) {}
            }, 1000);
        },

        groupGaps(gaps) {
            const grouped = {};
            gaps.forEach(ep => {
                if (!grouped[ep.season]) grouped[ep.season] = [];
                grouped[ep.season].push(ep);
            });
            for(let s in grouped) { grouped[s].sort((a,b) => a.episode - b.episode); }
            return grouped;
        },

        async ignoreSeries(series) {
            if(!confirm(`确定要永久忽略《${series.series_name}》的全部缺集提醒吗？\n(在已忽略名单中可以恢复)`)) return;
            try {
                const res = await fetch('/api/gaps/ignore/series', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ series_id: series.series_id, series_name: series.series_name }) });
                const data = await res.json();
                if (data.status === 'success') {
                    // 原地在前端移除卡片，极致丝滑
                    this.gapData = this.gapData.filter(s => s.series_id !== series.series_id);
                }
            } catch(e) {}
        },

        async openResolver(series, ep) {
            if (ep.status === 2) return; 
            this.resolver.open = true; this.resolver.isLoading = true; this.resolver.seriesId = series.series_id; this.resolver.seriesName = series.series_name; this.resolver.season = ep.season; this.resolver.episode = ep.episode; this.resolver.genes = []; this.resolver.results = []; this.resolver.selectedTorrent = null; this.resolver.sourceEpObj = ep; 
            try {
                const res = await fetch('/api/gaps/search_mp', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ series_id: series.series_id, series_name: series.series_name, season: ep.season, episode: ep.episode }) });
                const data = await res.json();
                if (data.status === 'success') {
                    this.resolver.genes = data.data.genes; this.resolver.results = data.data.results;
                    if(this.resolver.results.length > 0) this.resolver.selectedTorrent = this.resolver.results[0]; 
                }
            } catch(e) {}
            this.resolver.isLoading = false;
        },

        closeResolver() { this.resolver.open = false; },

        async sendToMP() {
            if(!this.resolver.selectedTorrent) return;
            this.resolver.isSubmitting = true;
            try {
                const res = await fetch('/api/gaps/download', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ series_id: this.resolver.seriesId, series_name: this.resolver.seriesName, season: this.resolver.season, episode: this.resolver.episode, torrent_info: this.resolver.selectedTorrent }) });
                const data = await res.json();
                if (data.status === 'success') { if (this.resolver.sourceEpObj) this.resolver.sourceEpObj.status = 2; this.closeResolver(); } 
                else { alert(data.message); }
            } catch(e) {}
            this.resolver.isSubmitting = false;
        },

        async ignoreGap() {
            try {
                const res = await fetch('/api/gaps/ignore', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ series_id: this.resolver.seriesId, series_name: this.resolver.seriesName, season_number: this.resolver.season, episode_number: this.resolver.episode }) });
                const data = await res.json();
                if (data.status === 'success') { if (this.resolver.sourceEpObj) this.resolver.sourceEpObj.status = 1; this.closeResolver(); }
            } catch(e) {}
        },

        formatBytes(bytes) {
            if(bytes === 0) return '0 B';
            const k = 1024, sizes = ['B', 'KB', 'MB', 'GB', 'TB'], i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    }));
});
</script>
