<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>求片审批中心 - EmbyPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .glass-row { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); transition: background 0.2s; }
        .glass-row:hover { background: rgba(30, 41, 59, 0.9); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="antialiased min-h-screen pb-20" x-data="adminApp()">

    <nav class="sticky top-0 z-40 bg-slate-900/80 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span class="text-2xl">⚡️</span> 审批控制台
            </h1>
            <div class="flex items-center gap-4 text-sm font-medium">
                <a href="/" class="text-slate-400 hover:text-white transition">返回主站</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pt-8">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                <div class="text-slate-400 text-sm mb-1">待处理</div>
                <div class="text-2xl font-bold text-blue-400" x-text="requests.filter(r => r.status === 0).length"></div>
            </div>
            <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                <div class="text-slate-400 text-sm mb-1">下载中</div>
                <div class="text-2xl font-bold text-yellow-400" x-text="requests.filter(r => r.status === 1).length"></div>
            </div>
            <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                <div class="text-slate-400 text-sm mb-1">已入库</div>
                <div class="text-2xl font-bold text-green-400" x-text="requests.filter(r => r.status === 2).length"></div>
            </div>
            <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                <div class="text-slate-400 text-sm mb-1">已拒绝</div>
                <div class="text-2xl font-bold text-red-400" x-text="requests.filter(r => r.status === 3).length"></div>
            </div>
        </div>

        <div class="flex gap-2 mb-6 overflow-x-auto hide-scrollbar">
            <button @click="filterStatus = 'all'" :class="filterStatus === 'all' ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-300'" class="px-4 py-1.5 rounded-full text-sm font-bold transition whitespace-nowrap">全部</button>
            <button @click="filterStatus = 0" :class="filterStatus === 0 ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-300'" class="px-4 py-1.5 rounded-full text-sm font-bold transition whitespace-nowrap">待审批</button>
            <button @click="filterStatus = 1" :class="filterStatus === 1 ? 'bg-yellow-600 text-white' : 'bg-slate-800 text-slate-300'" class="px-4 py-1.5 rounded-full text-sm font-bold transition whitespace-nowrap">下载中</button>
            <button @click="filterStatus = 2" :class="filterStatus === 2 ? 'bg-green-600 text-white' : 'bg-slate-800 text-slate-300'" class="px-4 py-1.5 rounded-full text-sm font-bold transition whitespace-nowrap">已入库</button>
        </div>

        <div class="space-y-3">
            <template x-for="item in filteredRequests" :key="item.tmdb_id">
                <div class="glass-row rounded-2xl p-3 flex flex-col md:flex-row gap-4 items-start md:items-center">
                    
                    <div class="flex gap-4 items-center w-full md:w-auto flex-1">
                        <img :src="item.poster_path" class="w-14 h-20 rounded object-cover shadow-md bg-slate-900 shrink-0">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="px-1.5 py-0.5 bg-slate-700 text-slate-300 rounded text-[10px] font-bold" x-text="item.media_type === 'movie' ? '电影' : '剧集'"></span>
                                <h3 class="font-bold text-base truncate" x-text="item.title"></h3>
                            </div>
                            <div class="text-xs text-slate-400 flex flex-wrap gap-x-3 gap-y-1">
                                <span>年份: <span x-text="item.year"></span></span>
                                <span>求片人数: <span class="text-indigo-400 font-bold" x-text="item.request_count"></span></span>
                                <span class="truncate max-w-[200px]">用户: <span x-text="item.requested_by"></span></span>
                                <span>时间: <span x-text="item.created_at.substring(0, 16)"></span></span>
                            </div>
                            <div x-show="item.status === 3 && item.reject_reason" class="mt-1 text-xs text-red-400 bg-red-400/10 px-2 py-0.5 rounded inline-block">
                                拒绝原因: <span x-text="item.reject_reason"></span>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-between w-full md:w-auto md:shrink-0 gap-4 mt-2 md:mt-0 pt-3 md:pt-0 border-t border-white/5 md:border-0">
                        <div class="w-20 text-center">
                            <span x-show="item.status === 0" class="text-blue-400 text-sm font-bold flex items-center gap-1 justify-center"><span class="w-2 h-2 rounded-full bg-blue-400"></span>待审批</span>
                            <span x-show="item.status === 1" class="text-yellow-400 text-sm font-bold flex items-center gap-1 justify-center"><span class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></span>下载中</span>
                            <span x-show="item.status === 2" class="text-green-400 text-sm font-bold flex items-center gap-1 justify-center"><span class="w-2 h-2 rounded-full bg-green-400"></span>已入库</span>
                            <span x-show="item.status === 3" class="text-red-400 text-sm font-bold flex items-center gap-1 justify-center"><span class="w-2 h-2 rounded-full bg-red-400"></span>已拒绝</span>
                        </div>

                        <div class="flex items-center gap-2">
                            <template x-if="item.status === 0">
                                <button @click="doAction(item.tmdb_id, 'approve')" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-medium transition active:scale-95">推送下载</button>
                            </template>
                            <template x-if="item.status === 1">
                                <button @click="doAction(item.tmdb_id, 'finish')" class="px-3 py-1.5 bg-green-600 hover:bg-green-500 text-white rounded-lg text-sm font-medium transition active:scale-95">标记入库</button>
                            </template>
                            <template x-if="item.status === 0 || item.status === 1">
                                <button @click="openRejectModal(item)" class="px-3 py-1.5 bg-slate-700 hover:bg-red-500/80 text-white rounded-lg text-sm font-medium transition active:scale-95">拒绝</button>
                            </template>
                            <button @click="if(confirm('确认彻底删除该记录？')) doAction(item.tmdb_id, 'delete')" class="p-1.5 text-slate-500 hover:text-red-400 bg-slate-800 rounded-lg transition" title="删除">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </template>
            <div x-show="filteredRequests.length === 0" class="text-center py-20 text-slate-500">
                暂无相关求片记录
            </div>
        </div>

    </main>

    <div x-show="rejectModal.open" class="fixed inset-0 z-50 flex items-center justify-center p-4" x-cloak>
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="rejectModal.open = false"></div>
        <div class="relative bg-slate-900 border border-white/10 rounded-2xl w-full max-w-md p-6 shadow-2xl"
             x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100">
            <h3 class="text-xl font-bold mb-4">确认拒绝该求片？</h3>
            <div class="mb-4">
                <p class="text-sm text-slate-400 mb-2">请选择或输入拒绝原因 (将通知给用户):</p>
                <div class="flex flex-wrap gap-2 mb-4">
                    <template x-for="reason in predefinedReasons" :key="reason">
                        <button @click="rejectModal.reasonType = reason" 
                                class="px-3 py-1.5 rounded-lg text-sm border transition"
                                :class="rejectModal.reasonType === reason ? 'bg-red-500/20 border-red-500 text-red-400' : 'bg-slate-800 border-white/5 text-slate-300 hover:bg-slate-700'">
                            <span x-text="reason"></span>
                        </button>
                    </template>
                </div>
                <div x-show="rejectModal.reasonType === '其他自定义'">
                    <textarea x-model="rejectModal.customReason" rows="3" placeholder="请输入具体原因..." class="w-full bg-slate-800 border border-white/10 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-red-500 transition"></textarea>
                </div>
            </div>
            <div class="flex gap-3 justify-end">
                <button @click="rejectModal.open = false" class="px-5 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 text-white font-medium transition">取消</button>
                <button @click="submitReject()" class="px-5 py-2 rounded-xl bg-red-600 hover:bg-red-500 text-white font-medium transition flex items-center gap-2">
                    <span x-show="isOperating" class="animate-spin w-4 h-4 border-2 border-white/30 border-t-white rounded-full"></span>
                    确认拒绝
                </button>
            </div>
        </div>
    </div>

    <div x-show="toast.show" x-transition x-cloak class="fixed top-10 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full shadow-2xl border backdrop-blur-xl flex items-center gap-2 font-bold bg-slate-800"
         :class="toast.type === 'success' ? 'border-green-500/30 text-green-400' : 'border-red-500/30 text-red-400'">
        <span x-text="toast.message"></span>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('adminApp', () => ({
                requests: [],
                filterStatus: 'all',
                isOperating: false,
                toast: { show: false, message: '', type: 'success' },
                
                // 拒绝 Modal 状态
                rejectModal: {
                    open: false,
                    tmdb_id: null,
                    reasonType: '影片未上映',
                    customReason: ''
                },
                predefinedReasons: ['影片未上映', '剧集未开播', '暂无可用资源', '质量太差等待洗版', '其他自定义'],

                init() {
                    this.loadData();
                },

                get filteredRequests() {
                    if (this.filterStatus === 'all') return this.requests;
                    return this.requests.filter(r => r.status === this.filterStatus);
                },

                showToast(msg, type = 'success') {
                    this.toast = { show: true, message: msg, type };
                    setTimeout(() => this.toast.show = false, 3000);
                },

                async loadData() {
                    try {
                        const res = await fetch('/api/manage/requests');
                        const data = await res.json();
                        if (data.status === 'success') {
                            this.requests = data.data;
                        }
                    } catch (e) {
                        this.showToast('加载数据失败', 'error');
                    }
                },

                openRejectModal(item) {
                    this.rejectModal.tmdb_id = item.tmdb_id;
                    this.rejectModal.reasonType = '暂无可用资源';
                    this.rejectModal.customReason = '';
                    this.rejectModal.open = true;
                },

                async submitReject() {
                    let finalReason = this.rejectModal.reasonType;
                    if (finalReason === '其他自定义') {
                        finalReason = this.rejectModal.customReason.trim();
                        if (!finalReason) return this.showToast('请输入自定义原因', 'error');
                    }
                    
                    this.isOperating = true;
                    try {
                        const res = await fetch('/api/manage/requests/action', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ tmdb_id: this.rejectModal.tmdb_id, action: 'reject', reject_reason: finalReason })
                        });
                        const data = await res.json();
                        if (data.status === 'success') {
                            this.showToast('已拒绝该求片');
                            this.rejectModal.open = false;
                            this.loadData();
                        } else {
                            this.showToast(data.message, 'error');
                        }
                    } catch (e) {
                        this.showToast('操作失败', 'error');
                    } finally {
                        this.isOperating = false;
                    }
                },

                async doAction(id, action) {
                    this.isOperating = true;
                    try {
                        const res = await fetch('/api/manage/requests/action', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ tmdb_id: id, action: action })
                        });
                        const data = await res.json();
                        if (data.status === 'success') {
                            this.showToast(data.message);
                            this.loadData();
                        } else {
                            this.showToast(data.message, 'error');
                        }
                    } catch (e) {
                        this.showToast('操作失败', 'error');
                    } finally {
                        this.isOperating = false;
                    }
                }
            }));
        });
    </script>
</body>
</html>
