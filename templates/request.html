<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>资源求片大厅 - EmbyPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { gray: { 850: '#1f2937', 900: '#111827', 950: '#030712' } } } }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        html.dark .glass-panel { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.15); }
        html.dark .card-hover:hover { box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.5); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-200 min-h-screen transition-colors duration-300" x-data="requestApp()" x-init="init()">

    <header class="fixed top-0 left-0 right-0 z-40 glass-panel border-b border-gray-200 dark:border-gray-800 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-blue-500/30">P</div>
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-300 tracking-tight hidden sm:block">EmbyPulse 求片中心</h1>
            </div>
            
            <div class="flex items-center gap-2 sm:gap-4">
                <button @click="toggleTheme()" class="p-2.5 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition text-gray-600 dark:text-gray-300">
                    <i class="fa-solid fa-moon text-lg" x-show="!isDark"></i>
                    <i class="fa-solid fa-sun text-lg" x-show="isDark" x-cloak></i>
                </button>
                <div class="h-6 w-px bg-gray-300 dark:bg-gray-700 mx-1"></div>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600 dark:text-blue-400 font-bold border border-blue-200 dark:border-blue-800/50">
                        <i class="fa-solid fa-user text-sm"></i>
                    </div>
                    <span class="text-sm font-medium hidden sm:block" x-text="user.Name"></span>
                </div>
                <button @click="logout()" class="ml-2 px-3 py-1.5 bg-red-50 text-red-600 hover:bg-red-100 dark:bg-red-500/10 dark:text-red-400 dark:hover:bg-red-500/20 rounded-lg text-sm font-bold transition flex items-center gap-2">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> <span class="hidden sm:inline">退出</span>
                </button>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-20 max-w-7xl mx-auto px-4">
        
        <div class="flex p-1 bg-gray-200/50 dark:bg-gray-800/50 rounded-2xl w-full max-w-md mx-auto mb-8 backdrop-blur-md">
            <button @click="activeTab = 'discover'" :class="activeTab === 'discover' ? 'bg-white dark:bg-gray-700 text-blue-600 dark:text-white shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200'" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-compass"></i> 发现
            </button>
            <button @click="activeTab = 'my'" :class="activeTab === 'my' ? 'bg-white dark:bg-gray-700 text-blue-600 dark:text-white shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200'" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-inbox"></i> 我的队列
            </button>
        </div>

        <div x-show="activeTab === 'discover'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0">
            <div class="relative max-w-2xl mx-auto mb-10 group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                </div>
                <input type="text" x-model="searchQuery" @keydown.enter="search()" placeholder="输入电影或剧集名称..." 
                       class="w-full pl-11 pr-32 py-4 bg-white dark:bg-gray-800/80 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-base dark:text-white transition-all backdrop-blur-sm">
                <div class="absolute inset-y-0 right-2 flex items-center">
                    <button @click="search()" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-sm font-bold shadow-md shadow-blue-500/30 transition-all active:scale-95 flex items-center gap-2">
                        <span x-show="isSearching" class="animate-spin w-4 h-4 border-2 border-white/30 border-t-white rounded-full"></span>
                        <span x-show="!isSearching">搜索</span>
                    </button>
                </div>
            </div>

            <div x-show="searchResults.length > 0" class="mb-12">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-list-ul text-blue-500"></i> 搜索结果</h2>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6">
                    <template x-for="item in searchResults" :key="item.tmdb_id">
                        <div class="card-hover bg-white dark:bg-gray-800 rounded-2xl overflow-hidden border border-gray-100 dark:border-gray-700 shadow-sm cursor-pointer relative group" @click="openModal(item)">
                            <div class="aspect-[2/3] bg-gray-200 dark:bg-gray-900 relative overflow-hidden">
                                <img :src="item.poster_path || 'https://via.placeholder.com/500x750?text=No+Poster'" class="w-full h-full object-cover transition duration-500 group-hover:scale-110">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
                                    <span class="w-full text-center py-2 bg-blue-600/90 backdrop-blur-md text-white rounded-xl text-sm font-bold">查看详情</span>
                                </div>
                                <div class="absolute top-2 right-2 px-2 py-1 bg-black/60 backdrop-blur-md text-white text-[10px] font-bold rounded-lg flex items-center gap-1">
                                    <i class="fa-solid fa-star text-yellow-400"></i> <span x-text="item.vote_average"></span>
                                </div>
                            </div>
                            <div class="p-3">
                                <h3 class="font-bold text-gray-900 dark:text-white truncate text-sm mb-1" x-text="item.title"></h3>
                                <div class="flex items-center justify-between text-xs">
                                    <span class="text-gray-500 dark:text-gray-400" x-text="item.year"></span>
                                    <span class="px-1.5 py-0.5 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 rounded uppercase font-bold text-[9px]" x-text="item.media_type"></span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="searchResults.length === 0">
                <div class="mb-10">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-fire text-red-500"></i> 热门电影</h2>
                    <div class="flex overflow-x-auto hide-scrollbar gap-4 pb-4 snap-x">
                        <template x-for="item in trending.movies" :key="item.tmdb_id">
                            <div class="snap-start shrink-0 w-[140px] sm:w-[160px] card-hover bg-white dark:bg-gray-800 rounded-2xl overflow-hidden border border-gray-100 dark:border-gray-700 shadow-sm cursor-pointer relative group" @click="openModal(item)">
                                <div class="aspect-[2/3] bg-gray-200 dark:bg-gray-900 relative">
                                    <img :src="item.poster_path" class="w-full h-full object-cover">
                                    <div class="absolute top-2 right-2 px-2 py-1 bg-black/60 backdrop-blur-md text-white text-[10px] font-bold rounded-lg"><i class="fa-solid fa-star text-yellow-400 mr-1"></i><span x-text="item.vote_average"></span></div>
                                </div>
                                <div class="p-2 sm:p-3">
                                    <h3 class="font-bold text-gray-900 dark:text-white truncate text-xs sm:text-sm mb-0.5" x-text="item.title"></h3>
                                    <p class="text-[10px] sm:text-xs text-gray-500 dark:text-gray-400" x-text="item.year"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div>
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-tv text-purple-500"></i> 高分剧集</h2>
                    <div class="flex overflow-x-auto hide-scrollbar gap-4 pb-4 snap-x">
                        <template x-for="item in trending.tv" :key="item.tmdb_id">
                            <div class="snap-start shrink-0 w-[140px] sm:w-[160px] card-hover bg-white dark:bg-gray-800 rounded-2xl overflow-hidden border border-gray-100 dark:border-gray-700 shadow-sm cursor-pointer relative group" @click="openModal(item)">
                                <div class="aspect-[2/3] bg-gray-200 dark:bg-gray-900 relative">
                                    <img :src="item.poster_path" class="w-full h-full object-cover">
                                    <div class="absolute top-2 right-2 px-2 py-1 bg-black/60 backdrop-blur-md text-white text-[10px] font-bold rounded-lg"><i class="fa-solid fa-star text-yellow-400 mr-1"></i><span x-text="item.vote_average"></span></div>
                                </div>
                                <div class="p-2 sm:p-3">
                                    <h3 class="font-bold text-gray-900 dark:text-white truncate text-xs sm:text-sm mb-0.5" x-text="item.title"></h3>
                                    <p class="text-[10px] sm:text-xs text-gray-500 dark:text-gray-400" x-text="item.year"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <div x-show="activeTab === 'my'" x-cloak x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left text-blue-500"></i> 请求历史</h2>
                <button @click="loadMyRequests()" class="text-sm text-gray-500 hover:text-blue-600 dark:hover:text-blue-400 transition flex items-center gap-1">
                    <i class="fa-solid fa-rotate-right" :class="isLoadingMy ? 'animate-spin' : ''"></i> 刷新
                </button>
            </div>
            
            <div x-show="myRequests.length === 0" class="text-center py-20 bg-white dark:bg-gray-800/50 rounded-3xl border border-gray-100 dark:border-gray-800 border-dashed">
                <div class="text-5xl text-gray-300 dark:text-gray-600 mb-4"><i class="fa-solid fa-box-open"></i></div>
                <p class="text-gray-500 dark:text-gray-400 font-medium">你还没有求片记录哦，快去发现页看看吧！</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="item in myRequests" :key="item.tmdb_id + '_' + item.season">
                    <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm flex gap-4 transition-all hover:shadow-md">
                        <img :src="item.poster_path" class="w-16 h-24 rounded-lg object-cover bg-gray-100 dark:bg-gray-900 shrink-0">
                        <div class="flex-1 min-w-0 flex flex-col justify-between">
                            <div>
                                <h3 class="font-bold text-gray-900 dark:text-white truncate text-base mb-1" x-text="item.title"></h3>
                                <div class="text-xs text-gray-500 dark:text-gray-400 mb-2 font-mono" x-text="item.requested_at"></div>
                            </div>
                            <div class="flex items-end justify-between">
                                <span x-show="item.status === 0" class="text-blue-500 text-[11px] font-bold bg-blue-50 dark:bg-blue-500/10 px-2.5 py-1 rounded-lg border border-blue-100 dark:border-blue-500/20"><i class="fa-solid fa-spinner animate-spin mr-1"></i>审核中</span>
                                <span x-show="item.status === 1" class="text-yellow-600 dark:text-yellow-500 text-[11px] font-bold bg-yellow-50 dark:bg-yellow-500/10 px-2.5 py-1 rounded-lg border border-yellow-100 dark:border-yellow-500/20"><i class="fa-solid fa-cloud-arrow-down mr-1"></i>下载中</span>
                                <span x-show="item.status === 2" class="text-green-600 dark:text-green-500 text-[11px] font-bold bg-green-50 dark:bg-green-500/10 px-2.5 py-1 rounded-lg border border-green-100 dark:border-green-500/20"><i class="fa-solid fa-check mr-1"></i>已入库</span>
                                <span x-show="item.status === 3" class="text-red-500 text-[11px] font-bold bg-red-50 dark:bg-red-500/10 px-2.5 py-1 rounded-lg border border-red-100 dark:border-red-500/20" :title="'拒绝原因: ' + item.reject_reason"><i class="fa-solid fa-ban mr-1"></i>已拒绝</span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <div x-show="modalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6" x-cloak>
        <div class="absolute inset-0 bg-gray-900/60 dark:bg-black/80 backdrop-blur-sm transition-opacity" @click="closeModal()" x-transition.opacity></div>
        
        <div class="relative w-full max-w-3xl max-h-[90vh] flex flex-col bg-white dark:bg-gray-850 rounded-3xl shadow-2xl overflow-hidden"
             x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95 translate-y-8" x-transition:enter-end="opacity-100 scale-100 translate-y-0">
            
            <button @click="closeModal()" class="absolute top-4 right-4 z-10 w-8 h-8 flex items-center justify-center bg-black/40 hover:bg-black/60 backdrop-blur-md text-white rounded-full transition"><i class="fa-solid fa-xmark"></i></button>

            <div class="relative h-48 sm:h-64 shrink-0 bg-gray-200 dark:bg-gray-900">
                <img :src="modalItem.backdrop_path || modalItem.poster_path" class="w-full h-full object-cover opacity-60 dark:opacity-40">
                <div class="absolute inset-0 bg-gradient-to-t from-white via-white/80 to-transparent dark:from-gray-850 dark:via-gray-850/80"></div>
                <div class="absolute bottom-0 left-0 right-0 p-6 flex gap-4 items-end translate-y-6 sm:translate-y-8">
                    <img :src="modalItem.poster_path" class="w-24 sm:w-32 rounded-xl shadow-lg border-2 border-white dark:border-gray-800 bg-gray-100 dark:bg-gray-900">
                    <div class="flex-1 pb-2">
                        <div class="flex items-center gap-2 mb-1.5">
                            <span class="px-2 py-0.5 bg-blue-100 text-blue-700 dark:bg-blue-600/20 dark:text-blue-400 text-[10px] font-bold uppercase rounded border border-blue-200 dark:border-blue-500/30" x-text="modalItem.media_type"></span>
                            <span class="text-sm font-bold text-gray-600 dark:text-gray-300"><i class="fa-solid fa-star text-yellow-500 mr-1"></i><span x-text="modalItem.vote_average"></span></span>
                        </div>
                        <h2 class="text-2xl sm:text-3xl font-extrabold text-gray-900 dark:text-white leading-tight mb-1" x-text="modalItem.title"></h2>
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400" x-text="modalItem.year"></p>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-6 pt-10 sm:pt-14 custom-scrollbar">
                <div class="mb-6">
                    <h3 class="text-sm font-bold text-gray-900 dark:text-white mb-2 flex items-center gap-2"><i class="fa-solid fa-align-left text-blue-500"></i> 剧情简介</h3>
                    <p class="text-sm text-gray-600 dark:text-gray-400 leading-relaxed" x-text="modalItem.overview || '暂无简介'"></p>
                </div>

                <template x-if="modalItem.media_type === 'tv'">
                    <div class="mb-2">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-sm font-bold text-gray-900 dark:text-white flex items-center gap-2"><i class="fa-solid fa-layer-group text-purple-500"></i> 请勾选需要求片的季度</h3>
                            <button @click="toggleSelectAllSeasons()" class="text-xs text-blue-600 dark:text-blue-400 font-bold hover:underline">全选可用季</button>
                        </div>
                        
                        <div x-show="isLoadingSeasons" class="flex justify-center py-6 text-gray-400"><i class="fa-solid fa-circle-notch animate-spin text-2xl"></i></div>
                        
                        <div x-show="!isLoadingSeasons" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                            <template x-for="season in modalSeasons" :key="season.season_number">
                                <label class="relative flex flex-col p-3 rounded-xl border-2 cursor-pointer transition-all"
                                       :class="season.exists_locally ? 'bg-gray-50 border-gray-100 dark:bg-gray-800/50 dark:border-gray-800 opacity-60 cursor-not-allowed' : (selectedSeasons.includes(season.season_number) ? 'bg-blue-50 border-blue-500 dark:bg-blue-500/10 dark:border-blue-500' : 'bg-white border-gray-200 hover:border-blue-300 dark:bg-gray-800 dark:border-gray-700 dark:hover:border-blue-500/50')">
                                    
                                    <input type="checkbox" class="hidden" 
                                           :value="season.season_number" 
                                           x-model="selectedSeasons" 
                                           :disabled="season.exists_locally">
                                    
                                    <div class="flex justify-between items-start mb-1">
                                        <span class="font-bold text-sm text-gray-900 dark:text-white" x-text="'第 ' + season.season_number + ' 季'"></span>
                                        <i class="fa-solid fa-circle-check text-green-500" x-show="season.exists_locally"></i>
                                        <i class="fa-solid fa-circle-check text-blue-500" x-show="!season.exists_locally && selectedSeasons.includes(season.season_number)"></i>
                                    </div>
                                    <span class="text-[10px] text-gray-500" x-text="'共 ' + season.episode_count + ' 集'"></span>
                                    <div class="absolute inset-0 bg-transparent" x-show="season.exists_locally" title="该季已入库，无需重复求片"></div>
                                </label>
                            </template>
                        </div>
                    </div>
                </template>
            </div>

            <div class="shrink-0 p-4 sm:p-6 border-t border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-900/50 flex justify-end gap-3">
                <button @click="closeModal()" class="px-5 py-2.5 rounded-xl font-bold text-gray-600 bg-white border border-gray-200 hover:bg-gray-50 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-700 dark:hover:bg-gray-700 transition">取消</button>
                <button @click="submitRequest()" 
                        :disabled="isSubmitting || (modalItem.media_type === 'tv' && selectedSeasons.length === 0)"
                        class="px-6 py-2.5 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500 shadow-lg shadow-blue-500/30 transition active:scale-95 flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:active:scale-100">
                    <span x-show="isSubmitting" class="animate-spin w-4 h-4 border-2 border-white/30 border-t-white rounded-full"></span>
                    <span x-show="!isSubmitting">
                        确认提交 <span x-show="modalItem.media_type === 'tv' && selectedSeasons.length > 0" x-text="'(' + selectedSeasons.length + ')'"></span>
                    </span>
                </button>
            </div>
        </div>
    </div>

    <div x-show="toast.show" x-transition x-cloak class="fixed top-20 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full shadow-2xl border backdrop-blur-xl flex items-center gap-2 font-bold bg-white/90 dark:bg-gray-800/90"
         :class="toast.type === 'success' ? 'border-green-300 text-green-600 dark:border-green-500/30 dark:text-green-400' : 'border-red-300 text-red-600 dark:border-red-500/30 dark:text-red-400'">
        <i :class="toast.type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-xmark'"></i>
        <span x-text="toast.message"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('requestApp', () => ({
                isDark: document.documentElement.classList.contains('dark'),
                user: { Name: '加载中...' },
                activeTab: 'discover',
                searchQuery: '',
                isSearching: false,
                searchResults: [],
                trending: { movies: [], tv: [] },
                
                myRequests: [],
                isLoadingMy: false,
                
                modalOpen: false,
                modalItem: {},
                modalSeasons: [],
                selectedSeasons: [], // 🔥 数组：存储勾选的季度
                isLoadingSeasons: false,
                isSubmitting: false,
                
                toast: { show: false, message: '', type: 'success' },

                async init() {
                    const savedTheme = localStorage.getItem('theme');
                    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                        this.isDark = true;
                        document.documentElement.classList.add('dark');
                    } else {
                        this.isDark = false;
                        document.documentElement.classList.remove('dark');
                    }

                    await this.checkAuth();
                    this.loadTrending();
                    
                    this.$watch('activeTab', value => {
                        if (value === 'my') this.loadMyRequests();
                    });
                },

                toggleTheme() {
                    this.isDark = !this.isDark;
                    if (this.isDark) {
                        document.documentElement.classList.add('dark');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                        localStorage.setItem('theme', 'light');
                    }
                },

                showToast(msg, type = 'success') {
                    this.toast = { show: true, message: msg, type };
                    setTimeout(() => this.toast.show = false, 3000);
                },

                async checkAuth() {
                    try {
                        const res = await fetch('/api/requests/check');
                        const data = await res.json();
                        if (data.status === 'success') {
                            this.user = data.user;
                        } else {
                            window.location.href = '/request_login';
                        }
                    } catch (e) {
                        window.location.href = '/request_login';
                    }
                },

                async logout() {
                    await fetch('/api/requests/logout', { method: 'POST' });
                    window.location.href = '/request_login';
                },

                async loadTrending() {
                    try {
                        const res = await fetch('/api/requests/trending');
                        const data = await res.json();
                        if (data.status === 'success') this.trending = data.data;
                    } catch (e) { console.error(e); }
                },

                async search() {
                    if (!this.searchQuery.trim()) return;
                    this.isSearching = true;
                    try {
                        const res = await fetch(`/api/requests/search?query=${encodeURIComponent(this.searchQuery)}`);
                        const data = await res.json();
                        if (data.status === 'success') {
                            this.searchResults = data.data;
                            if (this.searchResults.length === 0) this.showToast('未找到相关结果', 'error');
                        }
                    } finally { this.isSearching = false; }
                },

                async loadMyRequests() {
                    this.isLoadingMy = true;
                    try {
                        const res = await fetch('/api/requests/my');
                        const data = await res.json();
                        if (data.status === 'success') this.myRequests = data.data;
                    } finally { this.isLoadingMy = false; }
                },

                async openModal(item) {
                    this.modalItem = item;
                    this.modalSeasons = [];
                    this.selectedSeasons = []; // 重置勾选
                    this.modalOpen = true;
                    
                    if (item.media_type === 'tv') {
                        this.isLoadingSeasons = true;
                        try {
                            const res = await fetch(`/api/requests/tv/${item.tmdb_id}`);
                            const data = await res.json();
                            if (data.status === 'success') {
                                this.modalSeasons = data.seasons;
                            }
                        } finally { this.isLoadingSeasons = false; }
                    }
                },

                closeModal() {
                    this.modalOpen = false;
                    setTimeout(() => { this.modalItem = {}; this.selectedSeasons = []; }, 300);
                },

                toggleSelectAllSeasons() {
                    const available = this.modalSeasons.filter(s => !s.exists_locally).map(s => s.season_number);
                    if (this.selectedSeasons.length === available.length) {
                        this.selectedSeasons = []; // 全不选
                    } else {
                        this.selectedSeasons = available; // 全选
                    }
                },

                async submitRequest() {
                    if (this.modalItem.media_type === 'tv' && this.selectedSeasons.length === 0) {
                        return this.showToast('请至少选择一个季度', 'error');
                    }

                    this.isSubmitting = true;
                    const payload = {
                        tmdb_id: this.modalItem.tmdb_id,
                        media_type: this.modalItem.media_type,
                        title: this.modalItem.title,
                        year: this.modalItem.year,
                        poster_path: this.modalItem.poster_path,
                        overview: this.modalItem.overview || '',
                        // 🔥 提交数组
                        seasons: this.modalItem.media_type === 'tv' ? this.selectedSeasons.map(Number) : [0]
                    };

                    try {
                        const res = await fetch('/api/requests/submit', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        const data = await res.json();
                        if (data.status === 'success') {
                            this.showToast(data.message);
                            this.closeModal();
                            if (this.activeTab === 'my') this.loadMyRequests();
                        } else {
                            this.showToast(data.message, 'error');
                        }
                    } catch (e) {
                        this.showToast('网络错误，请重试', 'error');
                    } finally {
                        this.isSubmitting = false;
                    }
                }
            }));
        });
    </script>
</body>
</html>
